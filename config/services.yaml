# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

parameters:
    app.default_locale: '%env(APP_DEFAULT_LOCALE)%'
    app.supported_locales: ['fa', 'en']
    default_telegram_mode: long_polling
    default_telegram_proxy: ''
    default_panel_proxy_enabled: 'false'
    default_panel_proxy_type: socks5
    default_panel_proxy_host: ''
    default_panel_proxy_port: ''
    default_panel_proxy_username: ''
    default_panel_proxy_password: ''
    default_panel_proxy_timeout: ''
    default_service_notify_expiry_days: '3,1'
    default_service_notify_traffic_thresholds: '80,95,100'
    default_renewal_carry_remaining_traffic: 'true'
    default_renewal_carry_remaining_days: 'true'
    default_renewal_expired_start_from_now: 'true'
    default_pricing_global_discount_percent: '0'
    default_traffic_addon_enabled: 'true'
    default_traffic_addon_min_gb: '1'
    default_traffic_addon_max_gb: '100'
    default_traffic_addon_price_per_gb: '0'

services:
    _instanceof:
        App\Bot\Application\ServiceAction\ServiceActionInterface:
            tags: ['app.telegram_service_action']
        App\Provisioning\Domain\VpnPanelDriverInterface:
            tags: ['app.vpn_driver']
        App\Payment\Domain\PaymentGatewayInterface:
            tags: ['app.payment_gateway']

    _defaults:
        autowire: true
        autoconfigure: true
        bind:
            string $botToken: '%env(TELEGRAM_BOT_TOKEN)%'
            string $webhookSecret: '%env(TELEGRAM_WEBHOOK_SECRET)%'
            $adminChatId: '%env(default::TELEGRAM_ADMIN_CHAT_ID)%'
            string $telegramMode: '%env(default:default_telegram_mode:TELEGRAM_MODE)%'
            string $telegramProxy: '%env(default:default_telegram_proxy:TELEGRAM_PROXY)%'
            string $panelProxyEnabled: '%env(default:default_panel_proxy_enabled:PANEL_PROXY_ENABLED)%'
            string $panelProxyType: '%env(default:default_panel_proxy_type:PANEL_PROXY_TYPE)%'
            string $panelProxyHost: '%env(default:default_panel_proxy_host:PANEL_PROXY_HOST)%'
            string $panelProxyPort: '%env(default:default_panel_proxy_port:PANEL_PROXY_PORT)%'
            string $panelProxyUsername: '%env(default:default_panel_proxy_username:PANEL_PROXY_USERNAME)%'
            string $panelProxyPassword: '%env(default:default_panel_proxy_password:PANEL_PROXY_PASSWORD)%'
            string $panelProxyTimeout: '%env(default:default_panel_proxy_timeout:PANEL_PROXY_TIMEOUT)%'
            string $serviceNotifyExpiryDays: '%env(default:default_service_notify_expiry_days:SERVICE_NOTIFY_EXPIRY_DAYS)%'
            string $serviceNotifyTrafficThresholds: '%env(default:default_service_notify_traffic_thresholds:SERVICE_NOTIFY_TRAFFIC_THRESHOLDS)%'
            string $renewalCarryRemainingTraffic: '%env(default:default_renewal_carry_remaining_traffic:RENEWAL_CARRY_REMAINING_TRAFFIC)%'
            string $renewalCarryRemainingDays: '%env(default:default_renewal_carry_remaining_days:RENEWAL_CARRY_REMAINING_DAYS)%'
            string $renewalExpiredStartFromNow: '%env(default:default_renewal_expired_start_from_now:RENEWAL_EXPIRED_START_FROM_NOW)%'
            string $pricingGlobalDiscountPercent: '%env(default:default_pricing_global_discount_percent:PRICING_GLOBAL_DISCOUNT_PERCENT)%'
            string $trafficAddonEnabled: '%env(default:default_traffic_addon_enabled:TRAFFIC_ADDON_ENABLED)%'
            string $trafficAddonMinGb: '%env(default:default_traffic_addon_min_gb:TRAFFIC_ADDON_MIN_GB)%'
            string $trafficAddonMaxGb: '%env(default:default_traffic_addon_max_gb:TRAFFIC_ADDON_MAX_GB)%'
            string $trafficAddonPricePerGb: '%env(default:default_traffic_addon_price_per_gb:TRAFFIC_ADDON_PRICE_PER_GB)%'
            string $paymentCardNumber: '%env(PAYMENT_CARD_NUMBER)%'
            string $paymentCardHolder: '%env(PAYMENT_CARD_HOLDER)%'
            $paymentDescription: '%env(default::PAYMENT_DESCRIPTION)%'

    App\:
        resource: '../src/'

    App\EventSubscriber\AdminLocaleSubscriber:
        arguments:
            $defaultLocale: '%app.default_locale%'
            $supportedLocales: '%app.supported_locales%'

    App\Provisioning\Infrastructure\VpnPanelDriverRegistry:
        arguments:
            $drivers: !tagged_iterator 'app.vpn_driver'

    App\Payment\Infrastructure\PaymentGatewayRegistry:
        arguments:
            $drivers: !tagged_iterator 'app.payment_gateway'
