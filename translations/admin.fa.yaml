help:
  payment_gateway_store_method: PaymentGateway اطلاعات اتصال و اعتبارنامه درگاه را نگهداری می‌کند. StorePaymentMethod تعیین می‌کند کاربر در بات چه روش‌هایی ببیند.
  plan_custom_pricing: در صورت فعال بودن، قیمت سفارشی بر اساس حجم و مدت محاسبه می‌شود.
  nowpayments_rate: نرخ تبدیل را بر اساس amount unit انتخاب‌شده (toman یا rial) تنظیم کنید.
  panel_bearer_token: برای حالت bearer در Sanaei v3 از Settings → Security → API Token استفاده کنید و auth mode را bearer بگذارید.
  incomplete_order_expiration: زمان انقضای سفارش ناقص در تنظیمات اتوماسیون را مشخص می‌کند.
